kind = "web"
previewPath = "/"
title = "Janeiro Tour"
version = "1.0.0"
id = "artifacts/janeiro-tour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23363

[services.development]
run = "pnpm --filter @workspace/janeiro-tour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/janeiro-tour", "run", "build" ]
publicDir = "artifacts/janeiro-tour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23363"
BASE_PATH = "/"
