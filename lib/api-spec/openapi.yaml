openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Janeiro Tour API - Premium Brazil Travel Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tours
    description: Tour operations
  - name: destinations
    description: Destination operations
  - name: blog
    description: Blog post operations
  - name: faqs
    description: FAQ operations
  - name: reviews
    description: Review operations
  - name: settings
    description: Site settings
  - name: admin
    description: Admin operations
  - name: extras
    description: Tour optional extras / add-ons
  - name: reservations
    description: Booking reservations
  - name: groupPrograms
    description: Group travel B2B programs
  - name: packages
    description: Multi-tour packages

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Tours
  /tours:
    get:
      operationId: listTours
      tags: [tours]
      summary: List all tours
      parameters:
        - name: destination
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [private, group, shared, all]
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"
    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  /tours/featured:
    get:
      operationId: listFeaturedTours
      tags: [tours]
      summary: List featured tours for homepage
      responses:
        "200":
          description: Featured tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

  /tours/{id}:
    get:
      operationId: getTour
      tags: [tours]
      summary: Get a tour by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tour detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
        "404":
          description: Not found
    patch:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tours/slug/{slug}:
    get:
      operationId: getTourBySlug
      tags: [tours]
      summary: Get a tour by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tour detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  # Destinations
  /destinations:
    get:
      operationId: listDestinations
      tags: [destinations]
      summary: List all destinations
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"
    post:
      operationId: createDestination
      tags: [destinations]
      summary: Create a destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"

  /destinations/{id}:
    get:
      operationId: getDestination
      tags: [destinations]
      summary: Get a destination by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Destination detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
    patch:
      operationId: updateDestination
      tags: [destinations]
      summary: Update a destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
    delete:
      operationId: deleteDestination
      tags: [destinations]
      summary: Delete a destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Blog
  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List blog posts
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /blog/{id}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    patch:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # FAQs
  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List published packages
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

  /packages/{slug}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get package by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Package detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "404":
          description: Not found

  # Group Travel Programs
  /group-programs:
    get:
      operationId: listGroupPrograms
      tags: [groupPrograms]
      summary: List published group programs
      parameters:
        - name: includeUnpublished
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of group programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupProgram"
    post:
      operationId: createGroupProgram
      tags: [groupPrograms]
      summary: Create a group program (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupProgramInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupProgram"

  /group-programs/{slug}:
    get:
      operationId: getGroupProgram
      tags: [groupPrograms]
      summary: Get group program by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Program detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupProgram"
        "404":
          description: Not found

  /group-programs/id/{id}:
    patch:
      operationId: updateGroupProgram
      tags: [groupPrograms]
      summary: Update a group program (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupProgramInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupProgram"
    delete:
      operationId: deleteGroupProgram
      tags: [groupPrograms]
      summary: Delete a group program (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  # Hotels
  /hotels:
    get:
      operationId: listHotels
      tags: [hotels]
      summary: List hotels
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"
    post:
      operationId: createHotel
      tags: [hotels]
      summary: Create hotel (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
  /hotels/{id}:
    put:
      operationId: updateHotel
      tags: [hotels]
      summary: Update hotel (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
    delete:
      operationId: deleteHotel
      tags: [hotels]
      summary: Delete hotel (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  # Special Seasons
  /special-seasons:
    get:
      operationId: listSpecialSeasons
      tags: [specialSeasons]
      summary: List special seasons
      responses:
        "200":
          description: List of special seasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpecialSeason"
    post:
      operationId: createSpecialSeason
      tags: [specialSeasons]
      summary: Create special season (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialSeasonInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialSeason"
  /special-seasons/{id}:
    put:
      operationId: updateSpecialSeason
      tags: [specialSeasons]
      summary: Update special season (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialSeasonInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialSeason"
    delete:
      operationId: deleteSpecialSeason
      tags: [specialSeasons]
      summary: Delete special season (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List FAQs
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
        - name: includeDisabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: FAQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"
    post:
      operationId: createFaq
      tags: [faqs]
      summary: Create a FAQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"

  /faqs/{id}:
    patch:
      operationId: updateFaq
      tags: [faqs]
      summary: Update a FAQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"
    delete:
      operationId: deleteFaq
      tags: [faqs]
      summary: Delete a FAQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reviews
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    patch:
      operationId: updateReview
      tags: [reviews]
      summary: Update a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    delete:
      operationId: deleteReview
      tags: [reviews]
      summary: Delete a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Site Settings
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  # Admin Auth
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Invalid credentials

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Not authenticated

  # Stats endpoint for admin dashboard
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard stats summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all admin users (no passwords)
      responses:
        "200":
          description: List of admin users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated

  /admin/users/{id}/password:
    patch:
      operationId: changeAdminPassword
      tags: [admin]
      summary: Change password for an admin user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "404":
          description: User not found

  # Extras
  /tours/{slug}/extras:
    get:
      operationId: listTourExtras
      tags: [extras]
      summary: List active extras for a tour
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of extras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourExtra"

  /admin/extras:
    get:
      operationId: listAllExtras
      tags: [extras]
      summary: List all extras (admin), optionally filtered by tourId
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of extras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourExtra"

  /admin/tours/{tourId}/extras:
    post:
      operationId: createTourExtra
      tags: [extras]
      summary: Create a new extra for a tour
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourExtraInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourExtra"

  /admin/extras/{id}:
    put:
      operationId: updateTourExtra
      tags: [extras]
      summary: Update a tour extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourExtraUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourExtra"
    delete:
      operationId: deleteTourExtra
      tags: [extras]
      summary: Delete a tour extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Availability
  /tours/{slug}/availability:
    get:
      operationId: listTourAvailability
      tags: [tours]
      summary: List availability entries for a tour (public)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of availability entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourAvailabilityEntry"

  /admin/tours/{tourId}/availability:
    get:
      operationId: listAdminTourAvailability
      tags: [admin]
      summary: List all availability entries for a tour (admin)
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of availability entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourAvailabilityEntry"
    post:
      operationId: createAvailabilityEntry
      tags: [admin]
      summary: Add an availability entry for a tour
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourAvailabilityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourAvailabilityEntry"

  /admin/availability/{id}:
    put:
      operationId: updateAvailabilityEntry
      tags: [admin]
      summary: Update an availability entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourAvailabilityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourAvailabilityEntry"
    delete:
      operationId: deleteAvailabilityEntry
      tags: [admin]
      summary: Delete an availability entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reservations
  /admin/reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List all reservations (admin)
      parameters:
        - name: bookingStatus
          in: query
          schema:
            type: string
        - name: paymentStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"

  /admin/reservations/{id}:
    get:
      operationId: getReservation
      tags: [reservations]
      summary: Get a single reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
    patch:
      operationId: updateReservationStatus
      tags: [reservations]
      summary: Update reservation booking/payment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

