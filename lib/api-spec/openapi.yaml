openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Janeiro Tour API - Premium Brazil Travel Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tours
    description: Tour operations
  - name: destinations
    description: Destination operations
  - name: blog
    description: Blog post operations
  - name: faqs
    description: FAQ operations
  - name: reviews
    description: Review operations
  - name: settings
    description: Site settings
  - name: admin
    description: Admin operations
  - name: extras
    description: Tour optional extras / add-ons
  - name: reservations
    description: Booking reservations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Tours
  /tours:
    get:
      operationId: listTours
      tags: [tours]
      summary: List all tours
      parameters:
        - name: destination
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [private, group, shared, all]
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"
    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  /tours/featured:
    get:
      operationId: listFeaturedTours
      tags: [tours]
      summary: List featured tours for homepage
      responses:
        "200":
          description: Featured tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"

  /tours/{id}:
    get:
      operationId: getTour
      tags: [tours]
      summary: Get a tour by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tour detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
        "404":
          description: Not found
    patch:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tours/slug/{slug}:
    get:
      operationId: getTourBySlug
      tags: [tours]
      summary: Get a tour by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tour detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"

  # Destinations
  /destinations:
    get:
      operationId: listDestinations
      tags: [destinations]
      summary: List all destinations
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"
    post:
      operationId: createDestination
      tags: [destinations]
      summary: Create a destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"

  /destinations/{id}:
    get:
      operationId: getDestination
      tags: [destinations]
      summary: Get a destination by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Destination detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
    patch:
      operationId: updateDestination
      tags: [destinations]
      summary: Update a destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
    delete:
      operationId: deleteDestination
      tags: [destinations]
      summary: Delete a destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Blog
  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List blog posts
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /blog/{id}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    patch:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # FAQs
  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List FAQs
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: FAQ list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"
    post:
      operationId: createFaq
      tags: [faqs]
      summary: Create a FAQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"

  /faqs/{id}:
    patch:
      operationId: updateFaq
      tags: [faqs]
      summary: Update a FAQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"
    delete:
      operationId: deleteFaq
      tags: [faqs]
      summary: Delete a FAQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reviews
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    patch:
      operationId: updateReview
      tags: [reviews]
      summary: Update a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    delete:
      operationId: deleteReview
      tags: [reviews]
      summary: Delete a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Site Settings
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  # Admin Auth
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Invalid credentials

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Not authenticated

  # Stats endpoint for admin dashboard
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard stats summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # Extras
  /tours/{slug}/extras:
    get:
      operationId: listTourExtras
      tags: [extras]
      summary: List active extras for a tour
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of extras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourExtra"

  /admin/extras:
    get:
      operationId: listAllExtras
      tags: [extras]
      summary: List all extras (admin), optionally filtered by tourId
      parameters:
        - name: tourId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of extras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TourExtra"

  /admin/tours/{tourId}/extras:
    post:
      operationId: createTourExtra
      tags: [extras]
      summary: Create a new extra for a tour
      parameters:
        - name: tourId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourExtraInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourExtra"

  /admin/extras/{id}:
    put:
      operationId: updateTourExtra
      tags: [extras]
      summary: Update a tour extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourExtraUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourExtra"
    delete:
      operationId: deleteTourExtra
      tags: [extras]
      summary: Delete a tour extra
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reservations
  /admin/reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List all reservations (admin)
      parameters:
        - name: bookingStatus
          in: query
          schema:
            type: string
        - name: paymentStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"

  /admin/reservations/{id}:
    get:
      operationId: getReservation
      tags: [reservations]
      summary: Get a single reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
    patch:
      operationId: updateReservationStatus
      tags: [reservations]
      summary: Update reservation booking/payment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tour:
      type: object
      required: [id, slug, title, destination, category, durationHours, priceFrom, currency, tourType, languages, groupSizeMax, imageUrl, highlights, overview, includedItems, notIncludedItems, itinerary, meetingPoint, cancellationPolicy, published, featured, sortOrder, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        titleEs:
          type: ["string", "null"]
        titlePt:
          type: ["string", "null"]
        destination:
          type: string
        category:
          type: string
        durationHours:
          type: number
        priceFrom:
          type: number
        currency:
          type: string
        tourType:
          type: string
          enum: [private, group, shared, both]
        languages:
          type: array
          items:
            type: string
        groupSizeMax:
          type: integer
        imageUrl:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        overview:
          type: string
        overviewEs:
          type: ["string", "null"]
        overviewPt:
          type: ["string", "null"]
        includedItems:
          type: array
          items:
            type: string
        notIncludedItems:
          type: array
          items:
            type: string
        itinerary:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryStep"
        meetingPoint:
          type: string
        cancellationPolicy:
          type: string
        premiumBadge:
          type: ["string", "null"]
        regiondoWidget:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        published:
          type: boolean
        featured:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    TourInput:
      type: object
      required: [slug, title, destination, category, durationHours, priceFrom, currency, tourType, languages, groupSizeMax, imageUrl, highlights, overview, includedItems, notIncludedItems, itinerary, meetingPoint, cancellationPolicy]
      properties:
        slug:
          type: string
        title:
          type: string
        titleEs:
          type: string
        titlePt:
          type: string
        destination:
          type: string
        category:
          type: string
        durationHours:
          type: number
        priceFrom:
          type: number
        currency:
          type: string
        tourType:
          type: string
          enum: [private, group, shared, both]
        languages:
          type: array
          items:
            type: string
        groupSizeMax:
          type: integer
        imageUrl:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        overview:
          type: string
        overviewEs:
          type: string
        overviewPt:
          type: string
        includedItems:
          type: array
          items:
            type: string
        notIncludedItems:
          type: array
          items:
            type: string
        itinerary:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryStep"
        meetingPoint:
          type: string
        cancellationPolicy:
          type: string
        premiumBadge:
          type: string
        regiondoWidget:
          type: string
        seoTitle:
          type: string
        seoDescription:
          type: string
        published:
          type: boolean
        featured:
          type: boolean
        sortOrder:
          type: integer

    TourUpdate:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        titleEs:
          type: string
        titlePt:
          type: string
        destination:
          type: string
        category:
          type: string
        durationHours:
          type: number
        priceFrom:
          type: number
        currency:
          type: string
        tourType:
          type: string
        languages:
          type: array
          items:
            type: string
        groupSizeMax:
          type: integer
        imageUrl:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        overview:
          type: string
        overviewEs:
          type: string
        overviewPt:
          type: string
        includedItems:
          type: array
          items:
            type: string
        notIncludedItems:
          type: array
          items:
            type: string
        itinerary:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryStep"
        meetingPoint:
          type: string
        cancellationPolicy:
          type: string
        premiumBadge:
          type: ["string", "null"]
        regiondoWidget:
          type: string
        seoTitle:
          type: string
        seoDescription:
          type: string
        published:
          type: boolean
        featured:
          type: boolean
        sortOrder:
          type: integer

    ItineraryStep:
      type: object
      required: [order, title, description]
      properties:
        order:
          type: integer
        title:
          type: string
        description:
          type: string
        duration:
          type: ["string", "null"]

    Destination:
      type: object
      required: [id, slug, name, country, imageUrl, description, featured, sortOrder]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        nameEs:
          type: ["string", "null"]
        namePt:
          type: ["string", "null"]
        country:
          type: string
        imageUrl:
          type: string
        heroImageUrl:
          type: ["string", "null"]
        description:
          type: string
        descriptionEs:
          type: ["string", "null"]
        descriptionPt:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        featured:
          type: boolean
        sortOrder:
          type: integer

    DestinationInput:
      type: object
      required: [slug, name, country, imageUrl, description]
      properties:
        slug:
          type: string
        name:
          type: string
        nameEs:
          type: string
        namePt:
          type: string
        country:
          type: string
        imageUrl:
          type: string
        heroImageUrl:
          type: string
        description:
          type: string
        descriptionEs:
          type: string
        descriptionPt:
          type: string
        seoTitle:
          type: string
        seoDescription:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer

    DestinationUpdate:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        nameEs:
          type: ["string", "null"]
        namePt:
          type: ["string", "null"]
        country:
          type: string
        imageUrl:
          type: string
        heroImageUrl:
          type: ["string", "null"]
        description:
          type: string
        descriptionEs:
          type: ["string", "null"]
        descriptionPt:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        featured:
          type: boolean
        sortOrder:
          type: integer

    BlogPost:
      type: object
      required: [id, slug, title, excerpt, content, imageUrl, author, category, readTimeMinutes, featured, published, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        titleEs:
          type: ["string", "null"]
        titlePt:
          type: ["string", "null"]
        excerpt:
          type: string
        excerptEs:
          type: ["string", "null"]
        excerptPt:
          type: ["string", "null"]
        content:
          type: string
        contentEs:
          type: ["string", "null"]
        contentPt:
          type: ["string", "null"]
        imageUrl:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        author:
          type: string
        category:
          type: string
        readTimeMinutes:
          type: integer
